; ── Shared settings ───────────────────────────────────────────────
[common]
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Pin NimBLE explicitly first so PIO doesn't pull in a second copy
; when resolving ESP32-BLE-Gamepad's transitive dependency.
lib_deps =
    h2zero/NimBLE-Arduino @ 1.4.1
    lemmingdev/ESP32-BLE-Gamepad @ 0.5.4
    ; ArduinoOTA is bundled with the ESP32 Arduino core — no separate entry needed

lib_compat_mode = strict

; ── USB / Serial upload (first flash only) ────────────────────────
[env:esp32-c3-devkitm-1]
platform        = espressif32
board           = esp32-c3-devkitm-1
framework       = arduino
monitor_speed   = 115200
upload_protocol = esptool
build_flags     = ${common.build_flags}
lib_deps        = ${common.lib_deps}
lib_compat_mode = ${common.lib_compat_mode}

; ── OTA upload (all subsequent flashes) ───────────────────────────
; Usage:  pio run -e esp32-c3-ota --target upload
; Or set upload_port to the IP printed at boot and use normally.
[env:esp32-c3-ota]
platform        = espressif32
board           = esp32-c3-devkitm-1
framework       = arduino
monitor_speed   = 115200

upload_protocol = espota
upload_port     = flysky-esp32c3.local   ; mDNS hostname — or replace with IP
upload_flags    =
    --auth=ota1234                        ; must match OTA_PASSWORD in main.cpp

build_flags     = ${common.build_flags}
lib_deps        = ${common.lib_deps}
lib_compat_mode = ${common.lib_compat_mode}
